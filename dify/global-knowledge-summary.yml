    - data:
        code: "import json\n\ndef main(llm_output: str, original: str) -> dict:\n\
          \    cleaned = llm_output.strip()\n\n    current_global_knowledge = \"\"\
          \n    current_version = 0\n\n    try:\n        parsed = json.loads(original)\n\
          \        if isinstance(parsed, list) and len(parsed) > 0:\n            current_global_knowledge\
          \ = parsed[0].get(\"global_knowledge\", \"\")\n            current_version\
          \ = int(parsed[0].get(\"version_number\", 0))\n        else:\n         \
          \   current_global_knowledge = original\n    except Exception:\n       \
          \ current_global_knowledge = original\n\n    next_version = current_version\
          \ + 1\n\n    if cleaned == \"NO_CHANGE\":\n        should_update = \"false\"\
          \n        updated_global_knowledge = current_global_knowledge\n        version_number\
          \ = current_version\n    else:\n        should_update = \"true\"\n     \
          \   updated_global_knowledge = cleaned\n        version_number = next_version\n\
          \n    payload = json.dumps({\n        \"user_id\": \"jessy\",\n        \"\
          version_number\": version_number,\n        \"global_knowledge\": updated_global_knowledge,\n\
          \        \"change_log\": \"Updated from Global Knowledge Summary flow\"\
          ,\n        \"source_chunks\": []\n    }, ensure_ascii=False)\n\n    return\
          \ {\n        \"should_update\": should_update,\n        \"updated_global_knowledge\"\
          : updated_global_knowledge,\n        \"next_version_number\": str(version_number),\n\
          \        \"payload\": payload\n    }"
